<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007bff">

<link rel="apple-touch-icon" href="icon-192.png">
<title>Home Loan Calculator</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 15px;
    margin: 0;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #aaa;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 25px;
    font-size: 18px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
}

.result {
    margin-top: 25px;
    background: #e8f5e9;
    padding: 15px;
    border-radius: 8px;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="container">

<h1>Home Loan Calculator</h1>

<label>Loan Amount ($)</label>
<input id="loan" type="number" value="500000">

<label>Interest Rate (%)</label>
<input id="rate" type="number" step="0.01" value="6">

<label>Loan Term (Years)</label>
<input id="years" type="number" value="30">

<label>Repayment Frequency</label>
<select id="frequency">
    <option value="12">Monthly</option>
    <option value="26">Fortnightly</option>
    <option value="52">Weekly</option>
</select>

<button onclick="calculateLoan()">Calculate</button>

<div class="result" id="result">
Enter details and calculate.
</div>

</div>

<script>

// Currency formatter
function formatMoney(value) {
    return value.toLocaleString('en-AU', {
        style: 'currency',
        currency: 'AUD',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}


// Main calculation
function calculateLoan(){

    let loan = Number(document.getElementById("loan").value);
    let annualRate = Number(document.getElementById("rate").value);
    let years = Number(document.getElementById("years").value);
    let freq = Number(document.getElementById("frequency").value);

    if (!loan || !annualRate || !years) return;

    let ratePerPeriod = annualRate / 100 / freq;
    let totalPayments = years * freq;

    let repayment = 
        loan *
        (ratePerPeriod * Math.pow(1 + ratePerPeriod, totalPayments)) /
        (Math.pow(1 + ratePerPeriod, totalPayments) - 1);

    let totalPaid = repayment * totalPayments;
    let interest = totalPaid - loan;

    let label = freq == 12 ? "Monthly" : freq == 26 ? "Fortnightly" : "Weekly";

    document.getElementById("result").innerHTML = `
        <b>${label} Repayment</b><br>
        ${formatMoney(repayment)}

        <br><br>

        <b>Total Paid</b><br>
        ${formatMoney(totalPaid)}

        <br><br>

        <b>Total Interest</b><br>
        ${formatMoney(interest)}
    `;
}


// 🔥 LIVE UPDATE LISTENERS
document.getElementById("loan").addEventListener("input", calculateLoan);
document.getElementById("rate").addEventListener("input", calculateLoan);
document.getElementById("years").addEventListener("input", calculateLoan);
document.getElementById("frequency").addEventListener("change", calculateLoan);


// Run once on load
calculateLoan();

</script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("service-worker.js");

}

</script>
</body>
</html>
